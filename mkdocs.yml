site_name: Neuro Scutbook
site_description: A bedside neurology consult reference and evidence briefs for MDs, NPs, PAs, and medics — with a military-medicine layer.
# TODO: set these to your real GitHub username/repo before first deploy
site_url: https://USERNAME.github.io/neuro-scutbook/
repo_url: https://github.com/USERNAME/neuro-scutbook
repo_name: neuro-scutbook
copyright: >
  Educational clinical decision-support — not a substitute for professional
  judgment or individual medical advice. Verify against current guidelines.

theme:
  name: material
  icon:
    logo: material/brain
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets:
      base_path:
        - includes
      auto_append:
        - abbreviations.md

nav:
  - Home: index.md
  - Headache:
      - Overview & triage: headache/index.md
      - Migraine: headache/migraine.md
      - Cluster & TACs: headache/cluster-tac.md
      - Trigeminal neuralgia: headache/trigeminal-neuralgia.md
      - Medication overuse headache: headache/medication-overuse.md
      - New daily persistent headache: headache/new-daily-persistent.md
      - Post-traumatic headache: headache/post-traumatic.md
  - Military medicine:
      - Deployability & MEB/IDES: military/deployability.md
  - Contributing:
      - How to add a topic: contributing.md
