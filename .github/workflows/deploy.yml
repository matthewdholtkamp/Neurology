name: Deploy site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      # Strict build first: fails loudly on missing nav pages / broken links
      # instead of silently deploying an incomplete site.
      - run: mkdocs build --strict
      - run: mkdocs gh-deploy --force
